name: QGIS plugin

on:
    push:
        branches: ["**"]
        paths:
            - "qgis_plugin/**"
            - ".github/workflows/qgis-plugin.yml"
            - ".pre-commit-config.yaml"
    pull_request:
        branches: [main]
        paths:
            - "qgis_plugin/**"
            - ".github/workflows/qgis-plugin.yml"
            - ".pre-commit-config.yaml"

jobs:
    bandit:
        name: Bandit security scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.13"
            - name: Install Bandit
              run: pip install bandit==1.9.4
            - name: Run Bandit (matches plugins.qgis.org security gate)
              run: bandit -r qgis_plugin/hypercoast_qgis -ll

    pyqt6-smoke:
        name: PyQt6 import smoke
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  version: "0.4.16"
            - name: Set up Python
              run: uv python install 3.12
            - name: Install Qt6 runtime libs
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1
            - name: Install PyQt6, pytest, and plugin runtime deps
              run: |
                  uv venv --python 3.12
                  uv pip install PyQt6 PyQt6-QScintilla pytest numpy Pillow pandas xarray
            - name: Run import smoke tests
              run: uv run pytest qgis_plugin/qt6_tests -v
